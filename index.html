<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Quest — Học từ vựng tiếng Anh giao tiếp</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand" data-view-link="topics">
      <span class="logo">🎮</span>
      <span class="brand-name">Vocab Quest</span>
    </div>
    <nav class="main-nav" id="mainNav" hidden>
      <button class="nav-btn" data-view-link="topics" data-i18n="nav.topics">Chủ đề</button>
      <button class="nav-btn" data-view-link="progress" data-i18n="nav.progress">Tiến độ</button>
      <button class="nav-btn" data-view-link="toeic" data-i18n="nav.toeic">TOEIC</button>
    </nav>
    <div class="header-right">
      <div class="profile-chip" id="profileChip" hidden>
        <span class="profile-avatar" id="profileAvatar">🙂</span>
        <span class="profile-name" id="profileName"></span>
        <button class="icon-btn" id="switchProfileBtn" title="Đổi profile">↺</button>
      </div>
      <button class="icon-btn" id="langToggle" title="Language">🌐 <span id="langLabel">VI</span></button>
    </div>
  </header>

  <main id="app" class="app-main"></main>

  <footer class="app-footer">
    <span data-i18n="footer.made">Made for English Conversation learners</span>
  </footer>

  <!-- Data -->
  <script src="js/data/topics.js"></script>
  <script src="js/data/vocab.js"></script>
  <script src="js/data/toeic.js"></script>
  <script src="js/data/toeic-part1.js"></script>
  <script src="js/data/toeic-part2.js"></script>
  <script src="js/data/toeic-part3.js"></script>
  <script src="js/data/toeic-part4.js"></script>
  <script src="js/data/toeic-part5.js"></script>
  <script src="js/data/toeic-part6.js"></script>
  <script src="js/data/toeic-part7.js"></script>

  <!-- Core -->
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/pronunciation.js"></script>
  <script src="js/profile.js"></script>

  <!-- Games -->
  <script src="js/games/flashcard.js"></script>
  <script src="js/games/quiz.js"></script>
  <script src="js/games/typing.js"></script>
  <script src="js/games/matching.js"></script>
  <script src="js/games/speaking.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>
</body>
</html>
